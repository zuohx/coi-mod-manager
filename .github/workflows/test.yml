name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v6

      # ── Node.js + pnpm ──────────────────────────────────
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      # ── Rust ────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      # ── Install JS dependencies ─────────────────────────
      - name: Install dependencies
        run: pnpm install

      # ── Sync version ────────────────────────────────────
      - name: Sync version across config files
        run: pnpm sync:version

      # ── TypeScript check ────────────────────────────────
      - name: TypeScript check
        run: pnpm typecheck

      # ── Lint ────────────────────────────────────────────
      - name: Lint
        run: pnpm lint

      # ── Format check ────────────────────────────────────
      - name: Format check
        run: pnpm format:check

      # ── Run tests (Node) ────────────────────────────────
      - name: Run tests
        run: pnpm test

      # ── Run tests (Rust) — includes TS/Rust contract tests ─
      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib
