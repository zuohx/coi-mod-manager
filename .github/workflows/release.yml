name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # ── Node.js + pnpm ──────────────────────────────────
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # ── Rust ────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Install JS dependencies ─────────────────────────
      - name: Install dependencies
        run: pnpm install

      # ── Run tests ───────────────────────────────────────
      - name: Run tests
        run: pnpm test

      # ── Build Tauri app ─────────────────────────────────
      # beforeBuildCommand (pnpm build:server && pnpm build) runs automatically
      - name: Build Tauri app
        run: pnpm tauri:build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Upload installer artifact ───────────────────────
      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: coi-mod-manager-installer
          path: src-tauri/target/release/bundle/nsis/
          if-no-files-found: error

      # ── GitHub Release (only on tags) ───────────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: COI Mod Manager ${{ github.ref_name }}
          body: |
            自动构建发布 ${{ github.ref_name }}
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
          generate_release_notes: true
