name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v6

      # ── Node.js + pnpm ──────────────────────────────────
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      # ── Rust ────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # 即使测试/构建失败也保存缓存，避免下次重跑重下所有 crate
          cache-on-failure: true

      # ── Install JS dependencies ─────────────────────────
      - name: Install dependencies
        run: pnpm install

      # ── Run tests ───────────────────────────────────────
      - name: Run tests
        run: pnpm test

      # ── Sync version ─────────────────────────────────────
      # Tag 构建：先将 tag 版本号写入 package.json，再同步到 tauri.conf.json / Cargo.toml
      # 非 tag 构建：直接执行 sync:version 确保三处版本号一致
      - name: Patch package.json version from git tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          Write-Host "Patching package.json version to: $version"
          $pkg = Get-Content 'package.json' -Raw | ConvertFrom-Json
          $pkg.version = $version
          $pkg | ConvertTo-Json -Depth 99 | Set-Content 'package.json' -Encoding UTF8

      - name: Sync version to tauri.conf.json & Cargo.toml
        run: node scripts/sync-version.mjs

      # ── Build Tauri app ─────────────────────────────────
      - name: Build Tauri app
        run: pnpm tauri:build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      # ── Upload installer artifact ───────────────────────
      - name: Upload NSIS installer
        uses: actions/upload-artifact@v6
        with:
          name: coi-mod-manager-installer
          path: src-tauri/target/release/bundle/nsis/
          if-no-files-found: error

      # ── GitHub Release (only on tags) ───────────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: COI Mod Manager ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      # ── Generate latest.json for Tauri updater ───────────
      - name: Generate latest.json
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $nsisDir = 'src-tauri/target/release/bundle/nsis'
          $exe = Get-ChildItem -Path $nsisDir -Filter '*x64-setup.exe' | Select-Object -First 1
          $sig = Get-ChildItem -Path $nsisDir -Filter '*.sig' | Select-Object -First 1

          if (-not $exe -or -not $sig) {
            Write-Error "Missing .exe or .sig file in $nsisDir"
            exit 1
          }

          $payload = @{
            version   = $version
            notes     = "See release notes: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
            pub_date  = [DateTime]::UtcNow.ToString('o')
            platforms = @{
              'windows-x86_64' = @{
                signature = (Get-Content $sig.FullName -Raw).Trim()
                url       = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$($exe.Name)"
              }
            }
          }

          $payload | ConvertTo-Json -Depth 5 | Set-Content -Path 'latest.json'
          Write-Host "Generated latest.json:"
          Get-Content 'latest.json'

      - name: Upload latest.json to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
