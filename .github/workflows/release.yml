name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v6

      # ── Node.js + pnpm ──────────────────────────────────
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      # ── Rust ────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # 即使测试/构建失败也保存缓存，避免下次重跑重下所有 crate
          cache-on-failure: true

      # ── Install JS dependencies ─────────────────────────
      - name: Install dependencies
        run: pnpm install

      # ── Run tests ───────────────────────────────────────
      - name: Run tests
        run: pnpm test

      # ── Sync version from git tag ───────────────────────
      # When building from a tag (e.g. v0.1.1), patch tauri.conf.json
      # and Cargo.toml so the installer name uses the tag version.
      - name: Sync version from git tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          Write-Host "Patching version to: $version"

          # Patch version in tauri.conf.json
          $content = Get-Content 'src-tauri/tauri.conf.json' -Raw
          $content = $content -replace '(?<="version":\s").*?(?=")', $version
          Set-Content 'src-tauri/tauri.conf.json' -Value $content

          # Patch version in Cargo.toml
          $content = Get-Content 'src-tauri/Cargo.toml'
          $content = $content -replace '(?<=^version = ").*?(?=")', $version
          Set-Content 'src-tauri/Cargo.toml' -Value $content

      # ── Build Tauri app ─────────────────────────────────
      - name: Build Tauri app
        run: pnpm tauri:build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Upload installer artifact ───────────────────────
      - name: Upload NSIS installer
        uses: actions/upload-artifact@v6
        with:
          name: coi-mod-manager-installer
          path: src-tauri/target/release/bundle/nsis/
          if-no-files-found: error

      # ── GitHub Release (only on tags) ───────────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: COI Mod Manager ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
